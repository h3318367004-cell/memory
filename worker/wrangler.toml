name = "codex-memory-cloud"
main = "src/index.js"
compatibility_date = "2026-05-31"

[triggers]
# 20:20 UTC Sunday = 04:20 Monday Asia/Shanghai. autoDream only writes when source memories changed.
crons = ["20 20 * * 1"]

[[d1_databases]]
binding = "MEMORY_DB"
database_name = "codex-memory"
database_id = "7b39e202-94a4-437d-a08a-292d18921037"

# Set secrets with:
# wrangler secret put CODEX_MEMORY_TOKEN
# wrangler secret put DEEPSEEK_API_KEY
# wrangler secret put ZHIPU_API_KEY
